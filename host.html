<!DOCTYPE html>
<html>
<head>
<title>Host</title>

<style>
body { background:#0f0f1a; color:white; text-align:center; font-family:Arial; }
.big { font-size:120px; margin-top:20vh; }
.timer { font-size:40px; }
.card { background:#1c1c2b; margin:15px; padding:20px; border-radius:20px; }
input { margin:5px; }
</style>
</head>

<body>

<h1>🐺 Host</h1>

<div class="card">
<h3>🎧 Upload Voice Lines</h3>
Start: <input type="file" id="startAudio"><br>
Night: <input type="file" id="nightAudio"><br>

Wolf Open: <input type="file" id="wolfOpen"><br>
Wolf Close: <input type="file" id="wolfClose"><br>

Doctor Open: <input type="file" id="docOpen"><br>
Doctor Close: <input type="file" id="docClose"><br>

Seer Open: <input type="file" id="seerOpen"><br>
Seer Close: <input type="file" id="seerClose"><br>

Morning 1-4:
<input type="file" class="morning"><input type="file" class="morning"><input type="file" class="morning"><input type="file" class="morning"><br>

Evening 1-4:
<input type="file" class="evening"><input type="file" class="evening"><input type="file" class="evening"><input type="file" class="evening"><br>
</div>

<div class="card">
<button onclick="createGame()">Create Game</button>
<button onclick="startGame()">Start</button>
<p id="link"></p>
</div>

<div id="game" style="display:none;">
<div id="phaseIcon" class="big">🌙</div>
<div id="timer" class="timer"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDz6gkzRAAez80-ewZyX-ev4303PQb_wfI",
  authDomain: "werewolf-10fbd.firebaseapp.com",
  databaseURL: "https://werewolf-10fbd-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "werewolf-10fbd",
  storageBucket: "werewolf-10fbd.firebasestorage.app",
  messagingSenderId: "220925987615",
  appId: "1:220925987615:web:444dec6d8370373cd6be2a"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let gameId="";
let gameData={};

function createGame(){
  gameId=Math.random().toString(36).substr(2,6);

  db.ref("games/"+gameId).set({
    players:{},
    phase:"lobby",
    wolfVotes:{},
    actions:{},
    votes:{}
  });

  const url="https://dev-kage-cmd.github.io/werewolf-game/player.html?game="+gameId;
  document.getElementById("link").innerText=url;

  listen();
}

function listen(){
  db.ref("games/"+gameId).on("value",snap=>{
    gameData=snap.val();
  });
}

function play(file){
  if(file.files[0]){
    let audio=new Audio(URL.createObjectURL(file.files[0]));
    audio.play();
  }
}

function randomPlay(className){
  let files=document.querySelectorAll("."+className);
  let arr=[...files].filter(f=>f.files[0]);
  if(arr.length){
    let pick=arr[Math.floor(Math.random()*arr.length)];
    play(pick);
  }
}

function startGame(){
  document.getElementById("game").style.display="block";

  play(document.getElementById("startAudio"));

  setTimeout(runNight,2000);
}

async function waitFor(path,count){
  return new Promise(resolve=>{
    const ref=db.ref(path);
    const check=setInterval(async ()=>{
      let snap=await ref.once("value");
      let val=snap.val()||{};
      if(Object.keys(val).length>=count){
        clearInterval(check);
        resolve(val);
      }
    },500);
  });
}

async function runNight(){
  setPhase("night");

  play(document.getElementById("nightAudio"));

  await sleep(2000);

  // WEREWOLVES
  play(document.getElementById("wolfOpen"));

  let wolves=Object.values(gameData.players).filter(p=>p.role==="werewolf"||p.role==="alpha" && p.alive).length;
  await waitFor(`games/${gameId}/wolfVotes`,wolves);

  play(document.getElementById("wolfClose"));

  // DOCTOR
  play(document.getElementById("docOpen"));
  await waitFor(`games/${gameId}/actions`,1);
  play(document.getElementById("docClose"));

  // SEER
  play(document.getElementById("seerOpen"));
  await waitFor(`games/${gameId}/seer`,1);
  play(document.getElementById("seerClose"));

  resolveNight();
}

function resolveNight(){
  randomPlay("morning");
  setPhase("day");
  runDay();
}

function runDay(){
  let t=60;
  let timer=document.getElementById("timer");

  let int=setInterval(()=>{
    timer.innerText=t;
    t--;

    let alive=Object.keys(gameData.players).filter(p=>gameData.players[p].alive);
    let votes=gameData.votes||{};

    if(Object.keys(votes).length>=alive.length || t<=0){
      clearInterval(int);
      randomPlay("evening");
      runNight();
    }

  },1000);
}

function setPhase(p){
  db.ref("games/"+gameId+"/phase").set(p);
  document.getElementById("phaseIcon").innerText = p==="night" ? "🌙" : "☀️";
}

function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }
</script>

</body>
</html>
