<!DOCTYPE html>
<html>
<head>
<title>Host</title>
<style>
body { background:#0f0f1a; color:white; text-align:center; font-family:Arial; }
.big { font-size:120px; margin-top:20vh; }
.timer { font-size:40px; }
.card { background:#1c1c2b; margin:15px; padding:20px; border-radius:20px; }
button { cursor:pointer; }
#endScreen { display:none; position:absolute; top:0; left:0; width:100%; height:100%; background:#0f0f1a; color:white; text-align:center; font-family:Arial; justify-content:center; align-items:center; flex-direction:column; }
#endScreen h1 { font-size:80px; }
#endScreen h2 { font-size:40px; }
</style>
</head>
<body>

<div id="setup">
<h1>🐺 Host</h1>

<div class="card">
  <h2>🎭 Roles</h2>
  <div id="roles"></div>
</div>

<div class="card">
  <h2>👥 Players</h2>
  <div id="playerList">No players yet...</div>
</div>

<div class="card">
  <button onclick="createGame()">Create Game</button>
  <button onclick="startGame()">Start</button>
</div>

<div class="card">
  <canvas id="qr"></canvas>
  <p id="link"></p>
</div>
</div>

<div id="game" style="display:none;">
  <div id="phaseIcon" class="big">🌙</div>
  <div id="timer" class="timer"></div>
  <div id="voteCounter" style="margin-top:20px;"></div>
</div>

<div id="endScreen" class="flex">
  <h1 id="endEmoji"></h1>
  <h2 id="endText"></h2>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<script>
let nightCount = 0;
let roleCounts = {};
let gameId = "";
let gameData = {};
const roles = ["werewolf","villager","seer","doctor","hunter","jester"];

// ===== AUDIO (PUT MP3 LINKS) =====
const audio = {
  start: "Start.mp3",
  werewolfOpen: "WerewolfOpen.mp3",
  werewolfClose: "WerewolfClose.mp3",
  doctorOpen: "DoctorOpen.mp3",
  doctorClose: "DoctorClose.mp3",
  seerOpen: "SeerOpen.mp3",
  seerClose: "SeerClose.mp3",
  morning: ["Morning1.mp3","Morning2.mp3","Morning3.mp3","Morning4.mp3"],
  night: ["Night1.mp3","Night2.mp3"],
  villagersWin: "VillagersWin.mp3", // 🏡 villagers
  werewolvesWin: "WerewolvesWin.mp3", // 🐺 werewolves
  jesterWin: "JesterWin.mp3", // 🤡 jester
  NightSFX: "NightSFX.mp3"
};

function play(src){
  return new Promise(resolve=>{
    if(!src) return resolve();

    const a = new Audio(src);
    a.onended = resolve;
    a.onerror = resolve;
    a.play();
  });
}

function playRandom(arr){
  if(!arr.length) return Promise.resolve();
  return play(arr[Math.floor(Math.random()*arr.length)]);
}

let nightLoopAudio = null;

function startNightLoop(){
  if(!audio.NightSFX) return;

  if(nightLoopAudio){
    nightLoopAudio.pause();
  }

  nightLoopAudio = new Audio(audio.NightSFX);
  nightLoopAudio.loop = true;
  nightLoopAudio.volume = 0.5; // optional
  nightLoopAudio.play();
}

function stopNightLoop(){
  if(nightLoopAudio){
    nightLoopAudio.pause();
    nightLoopAudio.currentTime = 0;
    nightLoopAudio = null;
  }
}

// ===== FIREBASE =====
const firebaseConfig = {
  apiKey: "AIzaSyDz6gkzRAAez80-ewZyX-ev4303PQb_wfI",
  authDomain: "werewolf-10fbd.firebaseapp.com",
  databaseURL: "https://werewolf-10fbd-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "werewolf-10fbd",
  storageBucket: "werewolf-10fbd.appspot.com",
  messagingSenderId: "220925987615",
  appId: "1:220925987615:web:444dec6d8370373cd6be2a",
  measurementId: "G-L7ZG6JK23Z"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ===== ROLES UI =====
const rolesDiv = document.getElementById("roles");
roles.forEach(r=>{
  roleCounts[r] = 0;
  const div = document.createElement("div");
  div.innerHTML = `
    ${r} 
    <button onclick="change('${r}',-1)">-</button>
    <span id="${r}">0</span>
    <button onclick="change('${r}',1)">+</button>
  `;
  rolesDiv.appendChild(div);
});

function change(r,a){
  roleCounts[r] = Math.max(0,(roleCounts[r]||0)+a);
  document.getElementById(r).innerText = roleCounts[r];
}

// ===== CREATE GAME =====
function createGame(){
  gameId = Math.random().toString(36).substr(2,6);
  db.ref("games/"+gameId).set({
    roles:roleCounts,
    players:{},
    phase:"lobby",
    votes:{},
    wolfVotes:{},
    actions:{},
    nightRole:null,
    ended:false
  });

  const url = "https://dev-kage-cmd.github.io/werewolf-game/player.html?game=" + gameId;
  QRCode.toCanvas(document.getElementById("qr"), url);
  document.getElementById("link").innerText = url;

  listen();
}

function listen(){
  db.ref("games/"+gameId).on("value", snap=>{
    gameData = snap.val();
    updatePlayerList();
    updateVoteCounter();
  });
}

function gameActive(){
  return gameData && !gameData.ended;
}

// ===== ASSIGN ROLES =====
function assignRoles(){
  let pool = [];
  for(let r in roleCounts){
    for(let i=0;i<roleCounts[r];i++) pool.push(r);
  }

  Object.keys(gameData.players).forEach(name=>{
    let role = pool.splice(Math.random()*pool.length|0,1)[0] || "villager";
    db.ref(`games/${gameId}/players/${name}`).update({
      role,
      alive:true,
      lives:1
    });
  });
}

function checkAllReady(){
  const p = Object.values(gameData.players||{});
  return p.length && p.every(x=>x.ready);
}

// ===== START GAME =====
function startGame(){
  if(!gameData || !gameData.players){
    alert("Game not ready yet (wait 1–2 seconds after creating)");
    return;
  }
  if(Object.keys(gameData.players).length === 0){
    alert("No players joined!");
    return;
  }

  assignRoles();
  play(audio.start);

  const wait = setInterval(()=>{
    if(checkAllReady()){
      clearInterval(wait);
      document.getElementById("setup").style.display="none";
      document.getElementById("game").style.display="block";
      runNight();
    }
  },1000);
}

// ===== PHASE =====
function setPhase(p){
  db.ref(`games/${gameId}/phase`).set(p);
  document.getElementById("phaseIcon").innerText = p==="night"?"🌙":"☀️";
  document.getElementById("timer").innerText="";
}

function delay(ms){ return new Promise(r=>setTimeout(r,ms)); }
function alive(){ return Object.entries(gameData.players||{}).filter(([_,p])=>p.alive); }

// ===== WAIT ALL WEREWOLVES =====
function waitWerewolfVotes(){
  return new Promise(resolve=>{
    db.ref(`games/${gameId}/wolfVotes`).on("value", snap=>{
      const votes = snap.val()||{};
      const aliveWolves = alive().filter(([_,p])=>p.role.includes("wolf"));
      if(Object.keys(votes).length >= aliveWolves.length) resolve();
    });
  });
}

function waitVotes(path,count){
  return new Promise(resolve=>{
    db.ref(`games/${gameId}/${path}`).on("value", snap=>{
      const d = snap.val()||{};
      if(Object.keys(d).length >= count) resolve();
    });
  });
}

// ===== NIGHT =====
async function runNight(){
  if(gameData.ended) return;

  setPhase("night");

  nightCount++;

  // Only play night ambience from Night 2 onwards
  if(nightCount >= 2){
    playRandom(audio.night);
  }
  
  startNightLoop();

  db.ref(`games/${gameId}/wolfVotes`).set({});
  db.ref(`games/${gameId}/actions`).set({});

  await delay(10000);

  const wolves = alive().filter(([_,p])=>p.role.includes("wolf"));

  // Werewolves
  db.ref(`games/${gameId}/nightRole`).set("werewolf");
  await play(audio.werewolfOpen);
  await waitWerewolfVotes();
  await play(audio.werewolfClose);
  db.ref(`games/${gameId}/nightRole`).set(null);

  // Doctor
  let doc = alive().find(([_,p])=>p.role==="doctor");
  if(doc){
    db.ref(`games/${gameId}/nightRole`).set("doctor");
    await play(audio.doctorOpen);
    await waitVotes("actions/save",1);
    await play(audio.doctorClose);
    db.ref(`games/${gameId}/nightRole`).set(null);
  }

  // Seer
  let seer = alive().find(([_,p])=>p.role==="seer");
  if(seer){
    db.ref(`games/${gameId}/nightRole`).set("seer");
    await play(audio.seerOpen);
    await waitVotes("actions/reveal",1);
    await play(audio.seerClose);
    db.ref(`games/${gameId}/nightRole`).set(null);
  }

  resolveNight();
}

// ===== RESOLVE NIGHT =====
function resolveNight(){
  if(gameData.ended) return;

  let votes=gameData.wolfVotes||{}, count={};

  Object.values(votes).forEach(v=>count[v]=(count[v]||0)+1);

  let target=Object.keys(count).reduce((a,b)=>count[a]>count[b]?a:b,null);
  let save=gameData.actions?.save;

  if(target && target!==save){
    kill(target);
  }

  if(checkWin()) return; // 👈 THIS STOPS EVERYTHING

  runDay();
}

function kill(name){
  const p = gameData.players[name];
  if(!p) return;
  db.ref(`games/${gameId}/players/${name}/alive`).set(false);
}

// ===== DAY =====
let dayInterval = null;

async function runDay(){
  if(gameData.ended) return;

  setPhase("day");
  stopNightLoop();
  playRandom(audio.morning);

  let t = 90;

  clearInterval(dayInterval); // 👈 IMPORTANT

  dayInterval = setInterval(()=>{
    if(gameData.ended){
      clearInterval(dayInterval);
      return;
    }

    document.getElementById("timer").innerText="Time: "+t;

    let aliveP = alive().map(([n])=>n);
    let votes = gameData.votes||{};

    if(Object.keys(votes).length>=aliveP.length){
      clearInterval(dayInterval);
      countVotes();
    }

    t--;
    if(t<0){
      clearInterval(dayInterval);
      countVotes();
    }

  },1000);
}

function countVotes(){
  const votes = gameData.votes||{}, count={};
  Object.values(votes).forEach(v=>count[v]=(count[v]||0)+1);
  const winner = Object.keys(count).reduce((a,b)=>count[a]>count[b]?a:b,null);

  if(winner && winner!=="SKIP"){
    kill(winner);
    if(gameData.players[winner].role==="jester") return end("jester");
  }

  db.ref(`games/${gameId}/votes`).set({});
  if(checkWin()) return;
  runNight();
}

// ===== CHECK WIN =====
function checkWin(){
  const a = alive().map(([_,p])=>p);
  const wolves = a.filter(p=>p.role.includes("wolf")).length;

  if(wolves===0) return end("villagers");
  if(wolves>=a.length-wolves) return end("werewolves");
  return false;
}

// ===== END GAME SCREEN =====
function end(type){
  gameData.ended = true;
  clearInterval(dayInterval);
  stopNightLoop();

  let emoji="", audioSrc="";
  if(type==="villagers"){ emoji="🏡"; audioSrc=audio.villagersWin; }
  if(type==="werewolves"){ emoji="🐺"; audioSrc=audio.werewolvesWin; }
  if(type==="jester"){ emoji="🤡"; audioSrc=audio.jesterWin; }

  document.getElementById("endEmoji").innerText = emoji;
  document.getElementById("endText").innerText = type.charAt(0).toUpperCase()+type.slice(1)+" win!";
  document.getElementById("game").style.display="none";
  document.getElementById("endScreen").style.display="flex";

  play(audioSrc);
}

// ===== UI UPDATES =====
function updatePlayerList(){
  const el = document.getElementById("playerList");
  if(!gameData || !gameData.players){ el.innerHTML="No players yet..."; return; }

  let html = "";
  Object.entries(gameData.players).forEach(([name,p])=>{
    const status = !p.alive ? "💀 Dead" : p.ready ? "✅ Ready" : "⏳ Not Ready";
    html += `<div style="background:#2a2a3d;margin:6px;padding:10px;border-radius:10px;display:flex;justify-content:space-between;">
      <span>${name}</span><span>${status}</span>
    </div>`;
  });
  el.innerHTML = html;
}

function updateVoteCounter(){
  const el = document.getElementById("voteCounter");
  if(!gameData || gameData.phase !== "day"){ el.innerHTML=""; return; }

  const votes = gameData.votes||{}, count={};
  Object.values(votes).forEach(v=>count[v]=(count[v]||0)+1);

  let html = "<h2>🗳️ Votes</h2>";
  Object.entries(gameData.players).forEach(([name,p])=>{
    if(!p.alive) return;
    html += `<div style="background:#2a2a3d;margin:6px;padding:10px;border-radius:10px;display:flex;justify-content:space-between;">
      <span>${name}</span><span>${count[name]||0} votes</span>
    </div>`;
  });

  const skip = count["SKIP"]||0;
  html += `<div style="background:#444;margin:6px;padding:10px;border-radius:10px;display:flex;justify-content:space-between;">
    <span>⏭ Skip</span><span>${skip} votes</span>
  </div>`;
  el.innerHTML = html;
}
</script>
</body>
</html>
