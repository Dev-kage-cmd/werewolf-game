<!DOCTYPE html>
<html>
<head>
<title>Host</title>

<style>
body { background:#0f0f1a; color:white; text-align:center; font-family:Arial; }
.big { font-size:120px; margin-top:20vh; }
.timer { font-size:40px; }
.card { background:#1c1c2b; margin:15px; padding:20px; border-radius:20px; }
</style>
</head>

<body>

<div id="setup">
<h1>🐺 Host</h1>
<div class="card" id="roles"></div>
<div class="card">
<button onclick="createGame()">Create</button>
<button onclick="startGame()">Start</button>
</div>
<div class="card">
<canvas id="qr"></canvas>
<p id="link"></p>
</div>
</div>

<div id="game" style="display:none;">
<div id="phaseIcon" class="big">🌙</div>
<div id="timer" class="timer"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDz6gkzRAAez80-ewZyX-ev4303PQb_wfI",
  authDomain: "werewolf-10fbd.firebaseapp.com",
  databaseURL: "https://werewolf-10fbd-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "werewolf-10fbd",
  storageBucket: "werewolf-10fbd.firebasestorage.app",
  messagingSenderId: "220925987615",
  appId: "1:220925987615:web:444dec6d8370373cd6be2a",
  measurementId: "G-L7ZG6JK23Z"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let roles = {
  werewolf: 1,
  alpha: 0,
  doctor: 1,
  seer: 1,
  hunter: 0,
  jester: 0,
  villager: 2
};

function renderRoles(){
  const div = document.getElementById("roles");
  div.innerHTML = "";

  Object.keys(roles).forEach(role=>{
    const row = document.createElement("div");

    row.innerHTML = `
      <b>${role.toUpperCase()}</b><br>
      <button onclick="changeRole('${role}', -1)">-</button>
      ${roles[role]}
      <button onclick="changeRole('${role}', 1)">+</button>
      <hr>
    `;

    div.appendChild(row);
  });
}

function changeRole(role, amount){
  roles[role] += amount;
  if(roles[role] < 0) roles[role] = 0;
  renderRoles();
}

const sounds = {
  start: "",
  wolfOpen: "",
  wolfClose: "",
  doctorOpen: "",
  doctorClose: "",
  seerOpen: "",
  seerClose: "",
  morning: ["","","",""],
  evening: ["","","",""]
};

function play(sound){
  if(!sound) return;
  new Audio(sound).play();
}

function random(arr){
  return arr[Math.floor(Math.random()*arr.length)];
}

let gameId="", gameData={};

function createGame(){
  gameId=Math.random().toString(36).substr(2,6);

  db.ref("games/"+gameId).set({
    players:{},
    phase:"lobby",
    wolfVotes:{},
    actions:{},
    votes:{}
  });

  const base = "https://dev-kage-cmd.github.io/werewolf-game/";
  const url = base + "player.html?game=" + gameId;

  QRCode.toCanvas(document.getElementById("qr"), url);
  document.getElementById("link").innerText=url;

  db.ref("games/"+gameId).on("value", s=>gameData=s.val());
}

function startGame(){
  play(sounds.start);

  const playerNames = Object.keys(gameData.players || {});
  let roleList = [];

  Object.keys(roles).forEach(r=>{
    for(let i=0;i<roles[r];i++) roleList.push(r);
  });

  // Shuffle roles
  roleList.sort(()=>Math.random()-0.5);

  playerNames.forEach((name,i)=>{
    db.ref(`games/${gameId}/players/${name}/role`)
      .set(roleList[i] || "villager");
  });

  document.getElementById("setup").style.display="none";
  document.getElementById("game").style.display="block";

  setPhase("night");
  runNight();
}

function setPhase(p){
  db.ref("games/"+gameId+"/phase").set(p);

  document.getElementById("phaseIcon").innerText = p==="night" ? "🌙" : "☀️";
}

async function waitFor(condition){
  return new Promise(resolve=>{
    const i=setInterval(()=>{
      if(condition()){
        clearInterval(i);
        resolve();
      }
    },500);
  });
}

async function runNight(){
  setPhase("night");
  play(random(sounds.evening));

  db.ref("games/"+gameId+"/wolfVotes").set({});
  db.ref("games/"+gameId+"/actions").set({});

  // WEREWOLVES
  db.ref("games/"+gameId+"/activeRole").set("werewolf");
  play(sounds.wolfOpen);

  await waitFor(()=>{
    let wolves = Object.entries(gameData.players||{})
      .filter(([n,p])=>p.role==="werewolf"||p.role==="alpha");
    let votes = gameData.wolfVotes||{};
    return wolves.length>0 && Object.keys(votes).length>=wolves.length;
  });

  play(sounds.wolfClose);

  // DOCTOR
  db.ref("games/"+gameId+"/activeRole").set("doctor");
  play(sounds.doctorOpen);

  await waitFor(()=>gameData.actions?.save);

  play(sounds.doctorClose);

  // SEER
  db.ref("games/"+gameId+"/activeRole").set("seer");
  play(sounds.seerOpen);

  await waitFor(()=>gameData.actions?.seer);

  play(sounds.seerClose);

  resolveNight();
}

function resolveNight(){
  let votes=gameData.wolfVotes||{}, count={};

  Object.values(votes).forEach(v=>count[v]=(count[v]||0)+1);

  let target = Object.keys(count).sort((a,b)=>count[b]-count[a])[0];
  let save = gameData.actions?.save;

  if(target && target!==save){
    db.ref(`games/${gameId}/players/${target}/alive`).set(false);
  }

  runDay();
}

function runDay(){
  setPhase("day");
  play(random(sounds.morning));

  let t=60;
  const el=document.getElementById("timer");

  let int=setInterval(()=>{
    el.innerText="Time: "+t;
    t--;

    if(t<0){
      clearInterval(int);
      countVotes();
    }
  },1000);
}

function countVotes(){
  let votes=gameData.votes||{}, count={};

  Object.values(votes).forEach(v=>count[v]=(count[v]||0)+1);

  let winner = Object.keys(count).sort((a,b)=>count[b]-count[a])[0];

  if(winner && winner!=="SKIP"){
    const role = gameData.players[winner].role;
    
    if(role === "jester"){
      alert("🤡 JESTER WINS!");
      location.reload();
    return;
  }
    db.ref(`games/${gameId}/players/${winner}/alive`).set(false);
  }

  db.ref("games/"+gameId+"/votes").set({});
  runNight();
}

renderRoles();
</script>

</body>
</html>
