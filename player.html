<!DOCTYPE html>
<html>
<head>
<title>Player</title>

<style>
body { background:#0f0f1a; color:white; font-family:Arial; text-align:center; }
.card { background:#1c1c2b; margin:15px; padding:20px; border-radius:20px; }
button { background:#6c5ce7; color:white; border:none; padding:12px; margin:6px; width:90%; border-radius:10px; }
</style>
</head>

<body>

<h1>🎭 Werewolf</h1>

<div class="card">
<input id="name" placeholder="Name">
<button onclick="join()">Join</button>
</div>

<div id="ui" class="card"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDz6gkzRAAez80-ewZyX-ev4303PQb_wfI",
  authDomain: "werewolf-10fbd.firebaseapp.com",
  databaseURL: "https://werewolf-10fbd-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "werewolf-10fbd",
  storageBucket: "werewolf-10fbd.firebasestorage.app",
  messagingSenderId: "220925987615",
  appId: "1:220925987615:web:444dec6d8370373cd6be2a"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const gameId=new URLSearchParams(location.search).get("game");
let myName="";

function join(){
  myName=document.getElementById("name").value;
  document.getElementById("ui").innerHTML="Joining...";
  
  db.ref(`games/${gameId}/players/${myName}`).set({
    alive:true,
    ready:true
  });
}

db.ref("games/"+gameId).on("value",snap=>{
  const game=snap.val();
  if(!game || !game.players[myName]) return;

  const me=game.players[myName];
  const ui=document.getElementById("ui");

  if(!me.alive){
    ui.innerHTML="💀 Dead";
    return;
  }

  if(game.phase==="night"){
    if(me.role==="werewolf" || me.role==="alpha"){
      ui.innerHTML="Vote";
      makeButtons(game.players,t=>{
        db.ref(`games/${gameId}/wolfVotes/${myName}`).set(t);
        ui.innerHTML="Chosen";
      },n=>n!==myName && game.players[n].role!=="werewolf" && game.players[n].role!=="alpha");
    }

    if(me.role==="doctor"){
      ui.innerHTML="Save";
      makeButtons(game.players,t=>{
        db.ref(`games/${gameId}/actions/save`).set(t);
        ui.innerHTML="Saved";
      },n=>n!==myName);
    }

    if(me.role==="seer"){
      ui.innerHTML="Reveal";
      makeButtons(game.players,t=>{
        db.ref(`games/${gameId}/seer/${myName}`).set(t);
        alert(game.players[t].role.includes("wolf")?"WOLF":"NOT");
        ui.innerHTML="Revealed";
      },n=>n!==myName);
    }
  }

  if(game.phase==="day"){
    ui.innerHTML="Vote";
    makeButtons(game.players,t=>{
      db.ref(`games/${gameId}/votes/${myName}`).set(t);
      ui.innerHTML="Voted";
    },n=>n!==myName);

    let skip=document.createElement("button");
    skip.innerText="Skip";
    skip.onclick=()=>{
      db.ref(`games/${gameId}/votes/${myName}`).set("SKIP");
      ui.innerHTML="Skipped";
    };
    ui.appendChild(skip);
  }
});

function makeButtons(players,cb,filter){
  let ui=document.getElementById("ui");
  Object.keys(players).forEach(n=>{
    if(players[n].alive){
      if(filter && !filter(n)) return;
      let b=document.createElement("button");
      b.innerText=n;
      b.onclick=()=>cb(n);
      ui.appendChild(b);
    }
  });
}
</script>

</body>
</html>
