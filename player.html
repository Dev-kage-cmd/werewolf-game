<!DOCTYPE html>
<html>
<head>
<title>Player</title>

<style>
body { background:#0f0f1a; color:white; text-align:center; font-family:Arial; }
.card { background:#1c1c2b; margin:15px; padding:20px; border-radius:20px; }
button { background:#6c5ce7; color:white; border:none; padding:12px; margin:6px; width:90%; border-radius:10px; }
</style>
</head>

<body>

<h1>🎭 Werewolf</h1>

<div class="card">
<input id="name" placeholder="Name">
<button onclick="join()">Join</button>
</div>

<div class="card">
<h2 id="role"></h2>
</div>

<div class="card" id="ui"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDz6gkzRAAez80-ewZyX-ev4303PQb_wfI",
  authDomain: "werewolf-10fbd.firebaseapp.com",
  databaseURL: "https://werewolf-10fbd-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "werewolf-10fbd",
  storageBucket: "werewolf-10fbd.firebasestorage.app",
  messagingSenderId: "220925987615",
  appId: "1:220925987615:web:444dec6d8370373cd6be2a",
  measurementId: "G-L7ZG6JK23Z"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const gameId=new URLSearchParams(location.search).get("game");
let myName="", shown=false;

function join(){
  myName=name.value;
  if(!myName) return alert("Enter name");

  document.querySelector(".card").innerHTML="⏳ Joining...";

  db.ref(`games/${gameId}/players/${myName}`).set({
    alive:true,
    ready:false
  });
}

function showRole(role){
  ui.innerHTML=`
    <h2>Your role:</h2>
    <h1>${role}</h1>
    <button onclick="ready()">Ready</button>
  `;
}

function ready(){
  db.ref(`games/${gameId}/players/${myName}/ready`).set(true);
  ui.innerHTML="⏳ Waiting...";
}

db.ref("games/"+gameId).on("value", snap=>{
  let g=snap.val();
  if(!g || !g.players || !g.players[myName]) return;

  let me=g.players[myName];

  if(!me.alive){ ui.innerHTML="💀 Dead"; return; }

  if(me.role && !me.ready){
    if(!shown){ showRole(me.role); shown=true; }
    return;
  }

  if(g.phase==="night") night(me.role,g);
  if(g.phase==="day") day(g.players);
});

function night(role,g){
  ui.innerHTML="🌙 Waiting...";

  if((role==="werewolf"||role==="alpha") && g.wolfVotes){
    ui.innerHTML="🐺 Vote";
    buttons(g.players,t=>{
      db.ref(`games/${gameId}/wolfVotes/${myName}`).set(t);
      ui.innerHTML="✅ Chosen";
    },n=>n!==myName && !g.players[n].role.includes("wolf"));
  }

  if(role==="doctor" && !g.actions?.save){
    ui.innerHTML="💉 Save";
    buttons(g.players,t=>{
      db.ref(`games/${gameId}/actions/save`).set(t);
      ui.innerHTML="✅ Saved";
    },n=>n!==myName);
  }

  if(role==="seer" && !g.actions?.reveal){
    ui.innerHTML="🔮 Reveal";
    buttons(g.players,t=>{
      db.ref(`games/${gameId}/actions/reveal`).set(t);
      alert(g.players[t].role.includes("wolf")?"🐺":"🙂");
      ui.innerHTML="✅ Done";
    },n=>n!==myName);
  }
}

function day(players){
  ui.innerHTML="☀️ Vote";

  buttons(players,t=>{
    db.ref(`games/${gameId}/votes/${myName}`).set(t);
    ui.innerHTML="🗳️ Voted";
  },n=>n!==myName);

  let skip=document.createElement("button");
  skip.innerText="⏭ Skip";
  skip.onclick=()=>{
    db.ref(`games/${gameId}/votes/${myName}`).set("SKIP");
    ui.innerHTML="⏭ Skipped";
  };

  ui.appendChild(skip);
}

function buttons(players,cb,filter){
  Object.keys(players).forEach(n=>{
    if(players[n].alive){
      if(filter && !filter(n)) return;

      let b=document.createElement("button");
      b.innerText=n;
      b.onclick=()=>cb(n);
      ui.appendChild(b);
    }
  });
}
</script>
</body>
</html>
