<!DOCTYPE html>
<html>
<head>
<title>Player</title>
<style>
body { background:#0f0f1a; color:white; text-align:center; font-family:Arial; }
.card { background:#1c1c2b; margin:15px; padding:20px; border-radius:20px; }
button { background:#6c5ce7; color:white; border:none; padding:12px; margin:6px; width:90%; border-radius:10px; }
</style>
</head>

<body>

<h1>🎭 Werewolf</h1>

<div class="card">
<input id="name" placeholder="Name">
<button onclick="join()">Join</button>
</div>

<div class="card" id="ui"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDz6gkzRAAez80-ewZyX-ev4303PQb_wfI",
  authDomain: "werewolf-10fbd.firebaseapp.com",
  databaseURL: "https://werewolf-10fbd-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "werewolf-10fbd",
  storageBucket: "werewolf-10fbd.firebasestorage.app",
  messagingSenderId: "220925987615",
  appId: "1:220925987615:web:444dec6d8370373cd6be2a",
  measurementId: "G-L7ZG6JK23Z"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const gameId=new URLSearchParams(location.search).get("game");
let myName="";

function join(){
  myName=document.getElementById("name").value;

  document.getElementById("ui").innerHTML="⏳ Joining...";

  db.ref(`games/${gameId}/players/${myName}`).set({
    alive:true,
    ready:true
  });
}

db.ref("games/"+gameId).on("value", snap=>{
  const g=snap.val();
  if(!g || !g.players || !g.players[myName]) return;

  const me=g.players[myName];

  if(!me.alive){
    ui.innerHTML="💀 You are dead";
    return;
  }

  if(g.phase==="night"){
    if(g.activeRole==="werewolf" && (me.role==="werewolf"||me.role==="alpha")){
      showWolf(g.players);
    }
    else if(g.activeRole==="doctor" && me.role==="doctor"){
      showDoctor(g.players);
    }
    else if(g.activeRole==="seer" && me.role==="seer"){
      showSeer(g.players);
    }
    else{
      ui.innerHTML="😴 Sleep...";
    }
  }

  if(g.phase==="day"){
    showVote(g.players);
  }
});

function showWolf(players){
  ui.innerHTML="🐺 Choose target";

  makeButtons(players,n=>{
    db.ref(`games/${gameId}/wolfVotes/${myName}`).set(n);
    ui.innerHTML="✅ Voted";
  },n=>n!==myName && players[n].role!=="werewolf" && players[n].role!=="alpha");
}

function showDoctor(players){
  ui.innerHTML="💉 Save someone";

  makeButtons(players,n=>{
    db.ref(`games/${gameId}/actions/save`).set(n);
    ui.innerHTML="✅ Saved";
  },n=>n!==myName);
}

function showSeer(players){
  ui.innerHTML="🔮 Reveal someone";

  makeButtons(players,n=>{
    db.ref(`games/${gameId}/actions/seer`).set(n);
    alert(players[n].role.includes("wolf")?"🐺 WOLF":"🙂 SAFE");
    ui.innerHTML="✅ Done";
  },n=>n!==myName);
}

function showVote(players){
  ui.innerHTML="☀️ Vote";

  makeButtons(players,n=>{
    db.ref(`games/${gameId}/votes/${myName}`).set(n);
    ui.innerHTML="🗳️ Voted";
  },n=>n!==myName);

  let skip=document.createElement("button");
  skip.innerText="Skip";
  skip.onclick=()=>{
    db.ref(`games/${gameId}/votes/${myName}`).set("SKIP");
    ui.innerHTML="Skipped";
  };
  ui.appendChild(skip);
}

function makeButtons(players,cb,filter){
  Object.keys(players).forEach(n=>{
    if(players[n].alive){
      if(filter && !filter(n)) return;
      let b=document.createElement("button");
      b.innerText=n;
      b.onclick=()=>cb(n);
      ui.appendChild(b);
    }
  });
}
</script>

</body>
</html>
